<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Select Communication | EmbedCraft</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="animation.css">
<link rel="stylesheet" href="darkmode.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

</head>

<body class="dark-mode">

<button id="theme-btn" onclick="toggleTheme()">
<i class="bi bi-moon-stars-fill"></i>
</button>

<div class="container">

<h1>Select Communication Method</h1>

<p>Select the communication technology for your project.</p>

<div class="progress-box">

<div class="progress">

<div id="progress" style="width:50%;">
Step 3 of 6
</div>

</div>

</div>

<div class="cards">

<div class="card zoom"
onclick="selectCommunication('Wi-Fi');goNext('sensors.html');">

<i class="bi bi-wifi"></i>

<h2>Wi-Fi</h2>

<p>
Wireless Internet Communication
</p>

</div>

<div class="card zoom"
onclick="selectCommunication('Bluetooth');goNext('sensors.html');">

<i class="bi bi-bluetooth"></i>

<h2>Bluetooth</h2>

<p>
Short Range Communication
</p>

</div>

<div class="card zoom"
onclick="selectCommunication('GSM');goNext('sensors.html');">

<i class="bi bi-phone-fill"></i>

<h2>GSM</h2>

<p>
SIM Based Communication
</p>

</div>

<div class="card zoom"
onclick="selectCommunication('LoRa');goNext('sensors.html');">

<i class="bi bi-broadcast-pin"></i>

<h2>LoRa</h2>

<p>
Long Distance Low Power Communication
</p>

</div>

</div>

<br>

<button class="start-btn"
onclick="goBack('controller.html')">

<i class="bi bi-arrow-left-circle-fill"></i>

Previous

</button>

</div>

<script src="script.js"></script>
<script src="navigation.js"></script>
<script src="darkmode.js"></script>

</body>

</html>
